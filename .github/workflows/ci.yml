name: ci
on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tmi_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tmi_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: tmi-platform/pnpm-lock.yaml

      - run: pnpm -v

      - name: Install dependencies (tmi-platform workspace)
        working-directory: tmi-platform
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        working-directory: tmi-platform
        run: |
          pnpm -F @tmi/contracts build
          pnpm -F @tmi/hud-core build
          pnpm -F @tmi/hud-runtime build
          pnpm -F @tmi/hud-theme build
          pnpm -F @tmi/hud-tmi build

      - name: Generate API snapshots and verify
        working-directory: tmi-platform
        run: |
          pnpm run snapshot:api
          git --no-pager diff --exit-code api-snapshots || (echo "API snapshot changed; update api-snapshots/ in your PR if intentional" && exit 1)

      - name: Typecheck apps
        working-directory: tmi-platform
        run: |
          pnpm -C apps/web exec tsc -p tsconfig.json --noEmit
          pnpm -C packages/db run prisma:generate
          pnpm -C apps/api exec tsc -p tsconfig.json --noEmit

      - name: Build apps
        working-directory: tmi-platform
        run: |
          set -o pipefail
          pnpm -C apps/web build
          pnpm -C apps/api build

      - name: Promotion gate metrics pass proof
        working-directory: tmi-platform
        run: |
          READYZ_FIXTURE_MODE=degraded \
          READYZ_FIXTURE_METRICS_MODE=pass \
          node apps/api/scripts/readyz-ci-fixture.js &
          FIXTURE_PID=$!
          trap "kill ${FIXTURE_PID}" EXIT
          sleep 1
          READYZ_GATE_URL=http://127.0.0.1:4011/api/readyz \
          HEALTHZ_GATE_URL=http://127.0.0.1:4011/api/healthz \
          PROMOTION_METRICS_URL=http://127.0.0.1:4011/api/metrics/promotion \
          PROMOTION_METRICS_REQUIRED=true \
          PROMOTION_CANARY_MIN_SUCCESS_RATE=1.0 \
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES=1 \
          PROMOTION_CANARY_MAX_FAILURES=0 \
          pnpm -C apps/api run gate:readyz

      - name: Promotion gate metrics threshold miss proof
        working-directory: tmi-platform
        run: |
          READYZ_FIXTURE_MODE=degraded \
          READYZ_FIXTURE_METRICS_MODE=miss \
          node apps/api/scripts/readyz-ci-fixture.js &
          FIXTURE_PID=$!
          trap "kill ${FIXTURE_PID}" EXIT
          sleep 1
          if READYZ_GATE_URL=http://127.0.0.1:4011/api/readyz \
             HEALTHZ_GATE_URL=http://127.0.0.1:4011/api/healthz \
             PROMOTION_METRICS_URL=http://127.0.0.1:4011/api/metrics/promotion \
             PROMOTION_METRICS_REQUIRED=true \
             PROMOTION_CANARY_MIN_SUCCESS_RATE=1.0 \
             PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES=4 \
             PROMOTION_CANARY_MAX_FAILURES=0 \
             pnpm -C apps/api run gate:readyz; then
            echo "expected threshold miss to fail closed"
            exit 1
          fi

      - name: Promotion gate metrics invalid payload proof
        working-directory: tmi-platform
        run: |
          READYZ_FIXTURE_MODE=degraded \
          READYZ_FIXTURE_METRICS_MODE=invalid \
          node apps/api/scripts/readyz-ci-fixture.js &
          FIXTURE_PID=$!
          trap "kill ${FIXTURE_PID}" EXIT
          sleep 1
          if READYZ_GATE_URL=http://127.0.0.1:4011/api/readyz \
             HEALTHZ_GATE_URL=http://127.0.0.1:4011/api/healthz \
             PROMOTION_METRICS_URL=http://127.0.0.1:4011/api/metrics/promotion \
             PROMOTION_METRICS_REQUIRED=true \
             PROMOTION_CANARY_MIN_SUCCESS_RATE=1.0 \
             PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES=1 \
             PROMOTION_CANARY_MAX_FAILURES=0 \
             pnpm -C apps/api run gate:readyz; then
            echo "expected invalid metrics payload to fail closed"
            exit 1
          fi

      - name: Install Playwright Browser (chromium)
        working-directory: tmi-platform
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply DB Migrations (e2e)
        working-directory: tmi-platform
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tmi_platform
        run: pnpm -C packages/db exec prisma migrate deploy

      - name: Start API (e2e)
        working-directory: tmi-platform
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tmi_platform
          PORT: "4000"
          CORS_ORIGINS: http://localhost:3000,http://localhost:3001
        run: |
          pnpm --filter tmi-platform-api start > /tmp/api-e2e.log 2>&1 &
          echo $! > /tmp/api-e2e.pid
          sleep 2
          if ! kill -0 "$(cat /tmp/api-e2e.pid)" 2>/dev/null; then
            echo "api runtime exited immediately"
            cat /tmp/api-e2e.log || true
            exit 1
          fi

      - name: Start Web (e2e)
        working-directory: tmi-platform
        env:
          NEXTAUTH_SECRET: ci-nextauth-secret
          NEXTAUTH_URL: http://localhost:3001
          GITHUB_CLIENT_ID: ci-github-client-id
          GITHUB_CLIENT_SECRET: ci-github-client-secret
          ROUTING_STATE_SECRET: ci-routing-secret
          API_BASE_URL: http://localhost:4000
        run: |
          if [ ! -f apps/web/.next/BUILD_ID ]; then
            pnpm -C apps/web build
          fi
          pnpm -C apps/web start -- -p 3001 > /tmp/web-e2e.log 2>&1 &
          echo $! > /tmp/web-e2e.pid
          sleep 2
          if ! kill -0 "$(cat /tmp/web-e2e.pid)" 2>/dev/null; then
            echo "web runtime exited immediately"
            cat /tmp/web-e2e.log || true
            exit 1
          fi

      - name: Wait E2E Runtime
        run: |
          for i in {1..90}; do
            if curl -fsS --max-time 3 http://localhost:3001/auth >/dev/null && curl -fsS --max-time 3 http://localhost:4000/api/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "e2e runtime failed to become ready"
          echo "--- api log ---"
          if [ -f /tmp/api-e2e.log ]; then cat /tmp/api-e2e.log; fi
          echo "--- web log ---"
          if [ -f /tmp/web-e2e.log ]; then cat /tmp/web-e2e.log; fi
          exit 1

      - name: E2E Proof (phase17.3 onboarding recovery)
        working-directory: tmi-platform
        env:
          E2E_BASE_URL: http://localhost:3001
        run: pnpm exec playwright test tests/e2e/phase17_3_onboarding_recovery.spec.ts

      - name: E2E Regression (phase13.5 browser flows)
        working-directory: tmi-platform
        env:
          E2E_BASE_URL: http://localhost:3001
        run: pnpm exec playwright test tests/e2e/phase13_5.spec.ts

      - name: Stop E2E Runtime
        if: always()
        run: |
          if [ -f /tmp/web-e2e.pid ]; then
            kill "$(cat /tmp/web-e2e.pid)" || true
          fi
          if [ -f /tmp/api-e2e.pid ]; then
            kill "$(cat /tmp/api-e2e.pid)" || true
          fi
