<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMI — 3D Theater Audience Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08040a;font-family:'Exo 2',sans-serif;color:#FF8C00;padding:12px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes floatReact{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-90px) scale(.3);opacity:0}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tmi-btn{background:transparent;border:1px solid #E63000;color:#FF8C00;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;padding:6px 12px;transition:all .15s;letter-spacing:.05em;text-transform:uppercase}
.tmi-btn:hover{background:rgba(230,48,0,.25);color:#FFD700}
.tmi-btn.active{background:rgba(230,48,0,.3);color:#FFD700;border-color:#FFD700}
.tmi-btn.gold{border-color:#FFD700;color:#FFD700}
.react-btn{background:transparent;border:1px solid rgba(220,70,0,.5);color:#FF8C00;font-family:'Exo 2',sans-serif;font-size:9px;font-weight:700;cursor:pointer;border-radius:4px;padding:5px 8px;transition:all .15s;text-align:center}
.react-btn:hover{background:rgba(230,48,0,.2);color:#FFD700}
.venue-btn{background:rgba(8,14,38,.9);border:1px solid rgba(220,70,0,.4);color:#FF8C00;font-size:10px;font-weight:700;cursor:pointer;border-radius:4px;padding:5px 10px;font-family:'Exo 2',sans-serif;transition:all .15s;text-transform:uppercase;letter-spacing:.05em}
.venue-btn:hover{border-color:#E63000;color:#FFD700}
.venue-btn.active{border-color:#FFD700;color:#FFD700;background:rgba(230,48,0,.2)}
.lbl{font-size:9px;font-weight:700;letter-spacing:.12em;color:#FF8C00;text-transform:uppercase}
.panel{background:rgba(8,14,38,.95);border:1px solid rgba(220,70,0,.5);border-radius:6px}
</style>
</head>
<body>

<div class="panel" style="padding:8px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
  <div style="font-family:'Orbitron',sans-serif;font-weight:900;color:#E63000;font-size:14px;letter-spacing:.08em">🎭 TMI VENUE — 3D AUDIENCE ENGINE</div>
  <div style="display:flex;gap:6px;align-items:center">
    <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#00FF7F;box-shadow:0 0 5px #00FF7F;animation:blink 1.2s ease-in-out infinite"></span>
    <span style="font-size:9px;color:#00FF7F">LIVE</span>
    <span style="font-size:9px;color:rgba(255,140,0,.4)" id="crowdBadge">2,730 fans</span>
  </div>
</div>

<div style="display:flex;gap:6px;margin-bottom:8px;justify-content:center">
  <button class="tmi-btn active" id="btnFan" onclick="setView('fan')">👤 FAN VIEW</button>
  <button class="tmi-btn" id="btnPerformer" onclick="setView('performer')">🎤 PERFORMER VIEW</button>
</div>

<div style="display:flex;gap:5px;margin-bottom:8px;justify-content:center;flex-wrap:wrap">
  <span class="lbl" style="align-self:center">VENUE:</span>
  <button class="venue-btn active" onclick="setVenue(0,this)">🏛 Theater</button>
  <button class="venue-btn" onclick="setVenue(1,this)">🏟 Arena</button>
  <button class="venue-btn" onclick="setVenue(2,this)">🎪 Club</button>
  <button class="venue-btn" onclick="setVenue(3,this)">🌆 Outdoor</button>
  <button class="venue-btn" onclick="setVenue(4,this)">🎬 Boardroom</button>
</div>

<div style="position:relative;border-radius:8px;overflow:hidden;margin-bottom:8px">
  <canvas id="theaterCanvas" width="900" height="480" style="display:block;width:100%;border-radius:8px"></canvas>
  <div id="reactLayer" style="position:absolute;inset:0;pointer-events:none;overflow:hidden"></div>
  <div id="viewLabel" style="position:absolute;top:10px;left:12px;background:rgba(0,0,0,.7);border:1px solid rgba(220,70,0,.5);border-radius:4px;padding:4px 10px;font-size:9px;font-weight:700;color:#FF8C00;letter-spacing:.1em">FAN VIEW</div>
  <div style="position:absolute;top:10px;right:12px;background:rgba(0,0,0,.7);border:1px solid rgba(220,70,0,.4);border-radius:4px;padding:4px 10px;font-size:9px;color:#FF8C00">
    <span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:#00FF7F;margin-right:4px;vertical-align:middle"></span>
    <span id="crowdCount">2,730 fans</span>
  </div>
</div>

<div class="panel" style="padding:8px;margin-bottom:8px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px">
    <div class="lbl">Crowd Reactions</div>
    <div style="display:flex;gap:5px">
      <button class="tmi-btn" style="padding:4px 8px;font-size:9px" onclick="triggerWave()">🌊 WAVE</button>
      <button class="tmi-btn" style="padding:4px 8px;font-size:9px" onclick="triggerJump()">⬆ JUMP</button>
      <button class="tmi-btn gold" style="padding:4px 8px;font-size:9px" onclick="triggerHype()">🔥 HYPE</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:5px">
    <button class="react-btn" onclick="fireReact('👏','CLAP')"><div style="font-size:18px">👏</div><div>CLAP</div></button>
    <button class="react-btn" onclick="fireReact('✋','HANDS')"><div style="font-size:18px">✋</div><div>HANDS</div></button>
    <button class="react-btn" onclick="fireReact('❤️','HEARTS')"><div style="font-size:18px">❤️</div><div>HEARTS</div></button>
    <button class="react-btn" onclick="fireReact('🔥','FIRE')"><div style="font-size:18px">🔥</div><div>FIRE</div></button>
    <button class="react-btn" onclick="fireReact('💰','MONEY')"><div style="font-size:18px">💰</div><div>MONEY</div></button>
    <button class="react-btn" onclick="fireReact('⚡','HYPE')"><div style="font-size:18px">⚡</div><div>HYPE</div></button>
    <button class="react-btn" onclick="fireReact('🎵','VIBE')"><div style="font-size:18px">🎵</div><div>VIBE</div></button>
    <button class="react-btn" onclick="fireReact('🏆','WIN')"><div style="font-size:18px">🏆</div><div>WIN</div></button>
  </div>
</div>

<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">
  <div class="panel" style="padding:7px;text-align:center"><div class="lbl" style="font-size:7px;margin-bottom:2px">Front Row</div><div style="font-family:'Orbitron',sans-serif;font-size:14px;color:#FFD700">180</div><div style="font-size:7px;color:rgba(255,140,0,.5)">VIP · Diamond</div></div>
  <div class="panel" style="padding:7px;text-align:center"><div class="lbl" style="font-size:7px;margin-bottom:2px">Mid Floor</div><div style="font-family:'Orbitron',sans-serif;font-size:14px;color:#FFD700">820</div><div style="font-size:7px;color:rgba(255,140,0,.5)">Gold · Silver</div></div>
  <div class="panel" style="padding:7px;text-align:center"><div class="lbl" style="font-size:7px;margin-bottom:2px">Upper Deck</div><div style="font-family:'Orbitron',sans-serif;font-size:14px;color:#FFD700">1,204</div><div style="font-size:7px;color:rgba(255,140,0,.5)">Fan · General</div></div>
  <div class="panel" style="padding:7px;text-align:center"><div class="lbl" style="font-size:7px;margin-bottom:2px">Stage Pit</div><div style="font-family:'Orbitron',sans-serif;font-size:14px;color:#E63000">526</div><div style="font-size:7px;color:rgba(255,140,0,.5)">Ultra · Access</div></div>
  <div class="panel" style="padding:7px;text-align:center"><div class="lbl" style="font-size:7px;margin-bottom:2px">Total Tips</div><div style="font-family:'Orbitron',sans-serif;font-size:14px;color:#00FF7F">$4.2k</div><div style="font-size:7px;color:rgba(255,140,0,.5)">This show</div></div>
</div>

<script>
const canvas=document.getElementById('theaterCanvas');
const ctx=canvas.getContext('2d');
let W=canvas.width,H=canvas.height;
let currentView='fan',currentVenue=0,time=0;
let waveActive=false,jumpActive=false,hypeActive=false;

const VENUES=[
  {wallColor:'#1a0a04',floorColor:'#0e0602',ceilColor:'#0a0400',seatColor:'#5a1008',wallTex:true,crowd:2730},
  {wallColor:'#0a0a12',floorColor:'#080810',ceilColor:'#050510',seatColor:'#1a1a3a',wallTex:false,crowd:18500},
  {wallColor:'#0a0018',floorColor:'#060010',ceilColor:'#04000e',seatColor:'#2a0040',wallTex:false,crowd:420},
  {wallColor:'#050c18',floorColor:'#030a10',ceilColor:'#000608',seatColor:'#0a1a0a',wallTex:false,crowd:8200},
  {wallColor:'#080814',floorColor:'#050510',ceilColor:'#030308',seatColor:'#1a0a2a',wallTex:true,crowd:120},
];

const SKINS=['#8B4513','#5C3317','#2F1B0E','#A0522D','#CD853F','#D2691E','#704214','#3D2008','#6B3a2C','#915030'];
const HAIR=['#1a0a00','#3d2000','#000000','#2a1500','#0a0a0a','#4a2800','#1f0f00'];

function lerp(a,b,t){return a+(b-a)*t}

function drawBricks(x,y,w,h,col){
  ctx.fillStyle=col;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=.8;
  const bw=44,bh=16;
  for(let r=0;r*bh<h;r++){const off=(r%2)*bw/2;for(let c=0;c*bw<w+bw;c++)ctx.strokeRect(x+c*bw-off,y+r*bh,bw,bh)}
}

function drawHead(x,y,sz,skin,hair,aph,forward,lit){
  const L=lit;
  const r=(c)=>Math.round(parseInt(c.slice(1,3),16)*L);
  const g=(c)=>Math.round(parseInt(c.slice(3,5),16)*L);
  const b=(c)=>Math.round(parseInt(c.slice(5,7),16)*L);
  ctx.save();
  if(!forward){
    ctx.strokeStyle=`rgba(${r(skin)},${g(skin)},${b(skin)},.75)`;
    ctx.lineWidth=sz*.32;ctx.lineCap='round';
    if(Math.random()<.12){
      ctx.beginPath();ctx.moveTo(x-sz*.3,y+sz*.6);ctx.lineTo(x-sz*.3+Math.sin(aph)*sz*1.2,y-sz*1.1);ctx.stroke();
    } else {
      ctx.beginPath();ctx.moveTo(x-sz*.4,y+sz*.7);ctx.lineTo(x-sz*.4+Math.sin(aph)*sz*.6,y+sz+Math.cos(aph)*sz*.3);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x+sz*.4,y+sz*.7);ctx.lineTo(x+sz*.4+Math.sin(aph+1)*sz*.5,y+sz+Math.cos(aph+1)*sz*.3);ctx.stroke();
    }
    ctx.fillStyle=`rgb(${r(skin)},${g(skin)},${b(skin)})`;
    ctx.beginPath();ctx.ellipse(x,y+sz*.8,sz*.72,sz*.9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgb(${r(hair)},${g(hair)},${b(hair)})`;
    ctx.beginPath();ctx.ellipse(x,y,sz*.78,sz*.8,0,0,Math.PI*2);ctx.fill();
    if(Math.random()<.2){ctx.fillStyle=`rgba(100,200,255,${.45*L})`;ctx.fillRect(x-sz*.5,y-sz*.55,sz*.28,sz*.4);}
  } else {
    ctx.fillStyle=`rgb(${r(skin)},${g(skin)},${b(skin)})`;
    ctx.beginPath();ctx.ellipse(x,y+sz*.5,sz*.56,sz*.65,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x,y,sz*.66,sz*.72,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgb(${r(hair)},${g(hair)},${b(hair)})`;
    ctx.beginPath();ctx.arc(x,y-sz*.1,sz*.7,Math.PI,0);ctx.fill();
    ctx.fillStyle=`rgb(${r(skin)},${g(skin)},${b(skin)})`;
    ctx.beginPath();ctx.ellipse(x-sz*.74,y+sz*.1,sz*.22,sz*.18,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+sz*.74,y+sz*.1,sz*.22,sz*.18,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(30,10,0,${.8*L})`;
    ctx.beginPath();ctx.ellipse(x-sz*.22,y,sz*.12,sz*.16,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(x+sz*.22,y,sz*.12,sz*.16,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=`rgba(50,18,0,${.65*L})`;ctx.lineWidth=sz*.12;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(x,y+sz*.22,sz*.22,0,Math.PI);ctx.stroke();
    ctx.strokeStyle=`rgba(${r(skin)*0.8},${g(skin)*0.8},${b(skin)*0.8},.75)`;
    ctx.lineWidth=sz*.32;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(x-sz*.5,y+sz*.5);ctx.lineTo(x-sz*.6+Math.sin(aph)*sz*.9,y+sz*.4+Math.cos(aph)*sz*.6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+sz*.5,y+sz*.5);ctx.lineTo(x+sz*.6+Math.sin(aph+1.2)*sz*.8,y+sz*.4+Math.cos(aph+1.2)*sz*.5);ctx.stroke();
  }
  ctx.restore();
}

function drawFanView(v){
  ctx.clearRect(0,0,W,H);
  if(v.wallTex) drawBricks(0,0,W,H*.52,v.wallColor);
  else{ctx.fillStyle=v.wallColor;ctx.fillRect(0,0,W,H*.52);}
  ctx.fillStyle=v.floorColor;ctx.fillRect(0,H*.52,W,H*.48);

  const scrX=180,scrY=30,scrW=440,scrH=210;
  ctx.fillStyle='#1a0900';ctx.fillRect(scrX-10,scrY-10,scrW+20,scrH+20);
  const ag=ctx.createRadialGradient(scrX+scrW/2,scrY+scrH/2,10,scrX+scrW/2,scrY+scrH/2,scrW*.75);
  const ga=.84+Math.sin(time*.02)*.13;
  ag.addColorStop(0,`rgba(255,160,40,${ga})`);
  ag.addColorStop(.4,`rgba(200,100,15,${ga*.82})`);
  ag.addColorStop(.75,`rgba(100,50,5,${ga*.35})`);
  ag.addColorStop(1,'rgba(40,15,0,0)');
  ctx.fillStyle=ag;ctx.fillRect(scrX,scrY,scrW,scrH);
  const scan=(time*.9)%scrH;
  ctx.fillStyle='rgba(255,200,100,.045)';ctx.fillRect(scrX,scrY+scan,scrW,4);
  const wg=ctx.createRadialGradient(scrX+scrW/2,scrY+scrH,0,scrX+scrW/2,scrY+scrH,scrW*.9);
  wg.addColorStop(0,`rgba(255,140,20,${.17*ga})`);wg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=wg;ctx.fillRect(0,scrY,W,scrH+90);

  const rows=[
    {y:310,seats:15,sw:48,sz:9.5,lit:.15},
    {y:332,seats:14,sw:52,sz:11,lit:.22},
    {y:355,seats:13,sw:57,sz:13,lit:.32},
    {y:376,seats:12,sw:62,sz:14.5,lit:.44},
    {y:397,seats:11,sw:68,sz:16,lit:.58},
    {y:418,seats:10,sw:74,sz:17.5,lit:.72},
    {y:440,seats:9,sw:80,sz:18.5,lit:.85},
  ];
  rows.forEach((row,ri)=>{
    const sx=(W-row.seats*row.sw)/2;
    for(let c=0;c<row.seats;c++){
      const idx=ri*20+c;
      const px=sx+c*row.sw+row.sw/2;
      const wb=waveActive?Math.sin(time*.04+c*.6+ri*.3)*4.5:0;
      const jb=jumpActive?Math.abs(Math.sin(time*.08))*-7:0;
      drawHead(px,row.y+wb+jb,row.sz,SKINS[(idx*7+c*3)%SKINS.length],HAIR[(idx*5+ri*2)%HAIR.length],time*.025+(c*.4)+(ri*.2),false,row.lit);
    }
  });
}

function drawPerformerView(v){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,v.ceilColor);bg.addColorStop(1,v.floorColor);
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  if(v.wallTex) drawBricks(0,0,W,H*.42,v.wallColor);
  else{ctx.fillStyle=v.wallColor;ctx.fillRect(0,0,W,H*.42);}

  ['rgba(255,180,50,.1)','rgba(200,80,0,.08)','rgba(255,220,50,.07)'].forEach((c,i)=>{
    const lx=W*.2+i*W*.3;
    const lg=ctx.createRadialGradient(lx,0,0,lx,0,H*.65);
    lg.addColorStop(0,c);lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg;ctx.fillRect(0,0,W,H*.65);
  });

  const sg=ctx.createRadialGradient(W/2,H,0,W/2,H,W*.65);
  sg.addColorStop(0,'rgba(255,100,0,.32)');sg.addColorStop(.5,'rgba(180,60,0,.1)');sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,H*.48,W,H*.52);

  const seatRows=[
    {ri:0,yB:H*.40,seats:20,sw:36,sz:8,lit:.65},
    {ri:1,yB:H*.46,seats:18,sw:40,sz:9.5,lit:.72},
    {ri:2,yB:H*.52,seats:16,sw:44,sz:11,lit:.78},
    {ri:3,yB:H*.58,seats:14,sw:50,sz:13,lit:.84},
    {ri:4,yB:H*.65,seats:12,sw:56,sz:14.5,lit:.90},
    {ri:5,yB:H*.72,seats:10,sw:62,sz:16,lit:.94},
    {ri:6,yB:H*.79,seats:8,sw:70,sz:17.5,lit:.97},
    {ri:7,yB:H*.86,seats:6,sw:80,sz:19,lit:1},
  ];
  seatRows.forEach(row=>{
    const sx=(W-row.seats*row.sw)/2;
    for(let c=0;c<row.seats;c++){
      const idx=row.ri*30+c;
      const px=sx+c*row.sw+row.sw/2;
      const wb=waveActive?Math.sin(time*.04+c*.5)*5.5:0;
      const jb=jumpActive?Math.abs(Math.sin(time*.08+c*.3))*-9:0;
      const hb=hypeActive?(Math.sin(time*.06+c*.4)*4.5+Math.sin(time*.03+c*.2)*3.5):0;
      drawHead(px,row.yB+wb+jb+hb,row.sz,SKINS[(idx*7+c*3)%SKINS.length],HAIR[(idx*5+row.ri*2)%HAIR.length],time*.028+(c*.35)+(row.ri*.15),true,row.lit);
    }
  });

  const tf=ctx.createLinearGradient(0,H*.86,0,H);
  tf.addColorStop(0,'rgba(0,0,0,0)');tf.addColorStop(1,v.floorColor);
  ctx.fillStyle=tf;ctx.fillRect(0,H*.86,W,H*.14);
  const topF=ctx.createLinearGradient(0,0,0,H*.32);
  topF.addColorStop(0,'rgba(0,0,0,.55)');topF.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=topF;ctx.fillRect(0,0,W,H*.32);
}

function render(){
  time++;
  const v=VENUES[currentVenue];
  if(currentView==='fan') drawFanView(v);
  else drawPerformerView(v);
  if(waveActive&&time%80===0) waveActive=false;
  if(jumpActive&&time%60===0) jumpActive=false;
  if(hypeActive&&time%100===0) hypeActive=false;
  requestAnimationFrame(render);
}

function setView(v){
  currentView=v;
  document.getElementById('viewLabel').textContent=v==='fan'?'FAN VIEW':'PERFORMER VIEW';
  document.getElementById('btnFan').classList.toggle('active',v==='fan');
  document.getElementById('btnPerformer').classList.toggle('active',v==='performer');
}

function setVenue(i,btn){
  currentVenue=i;
  document.querySelectorAll('.venue-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const c=VENUES[i].crowd;
  document.getElementById('crowdCount').textContent=c.toLocaleString()+' fans';
  document.getElementById('crowdBadge').textContent=c.toLocaleString()+' fans';
}

function fireReact(emoji,label){
  const layer=document.getElementById('reactLayer');
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.textContent=emoji;
      el.style.cssText=`position:absolute;bottom:${10+Math.random()*30}%;left:${Math.random()*80+10}%;font-size:${16+Math.random()*12}px;animation:floatReact ${1.2+Math.random()*.8}s ease-out forwards;pointer-events:none`;
      layer.appendChild(el);
      setTimeout(()=>el.remove(),2200);
    },i*80);
  }
}

function triggerWave(){waveActive=true;}
function triggerJump(){jumpActive=true;}
function triggerHype(){hypeActive=true;}

render();
</script>
</body>
</html>
