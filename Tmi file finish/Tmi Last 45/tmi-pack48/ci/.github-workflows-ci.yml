# .github/workflows/ci.yml
# LOCKED — Never modify this file (Platform Law)
# Runs on every push to main and all PRs

name: TMI CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  # ── DISCOVERY SORT TEST (CRITICAL GATE) ─────────────────────────
  # This test MUST pass before any deploy. Platform Law #1.
  test-discovery-first:
    name: Discovery-First Sort Test (CRITICAL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tmi_test
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tmi_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
        working-directory: packages/db
      - name: "⚠️  CRITICAL: Discovery-First Lobby Sort"
        run: pnpm test:discovery
      - name: "Verify Law #7: Ads Always 200"
        run: pnpm test:ads-fallback
      - name: "Verify Law #3: Kid Safety"
        run: pnpm test:kid-safety
      - name: "Verify Law #4: Max 8 Tickets"
        run: pnpm test:ticket-max
      - name: "Verify Law #2: Diamond Never Removed"
        run: pnpm test:diamond-integrity

  # ── LINT + TYPE CHECK ─────────────────────────────────────────
  typecheck:
    name: TypeScript + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm lint

  # ── API HEALTH CHECK ─────────────────────────────────────────
  api-smoke:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tmi_test
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tmi_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "pnpm" }
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma migrate deploy
        working-directory: packages/db
      - run: pnpm prisma db seed
        working-directory: packages/db
      - run: pnpm build --filter=@tmi/api
      - name: Start API and smoke test
        run: |
          pnpm start --filter=@tmi/api &
          sleep 5
          curl -f http://localhost:4000/api/healthz
          curl -f http://localhost:4000/api/readyz
          curl -f http://localhost:4000/api/ads/slot/HOME1_HERO  # Must return 200
          echo "✓ All smoke tests passed"

  # ── DEPLOY (only on main) ─────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test-discovery-first, api-smoke]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy API to Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_API }}
      - name: Deploy Web to Vercel
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}
      - name: Run post-deploy smoke tests
        run: |
          sleep 30
          curl -f ${{ secrets.STAGING_API_URL }}/api/healthz
          curl -f ${{ secrets.STAGING_API_URL }}/api/ads/slot/HOME1_HERO
          echo "✓ Staging deploy verified"
