version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: berntout_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  runtime:
    build:
      context: ..
      dockerfile: deploy/runtime.Dockerfile
    container_name: berntout_runtime
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RUNTIME_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - redis

volumes:
  redis_data:
