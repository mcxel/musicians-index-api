name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm -w install --frozen-lockfile

      - name: Lint (workspace)
        run: pnpm -w lint

      - name: Typecheck (web)
        run: pnpm -C apps/web exec tsc -p tsconfig.json --noEmit

      - name: Build (web)
        run: pnpm -C apps/web build

      - name: Readiness Contract (api)
        run: pnpm -C apps/api run test:readiness-contract

      - name: Build (api)
        run: pnpm -C apps/api build

      - name: Assert Main Path Enforces gate:readyz
        run: |
          node -e "const fs=require('fs'); const lines=fs.readFileSync('.github/workflows/ci.yml','utf8').split(/\r?\n/); const idx=lines.findIndex((line)=>line.includes('- name: Promotion Gate (api readyz)')); if(idx<0){throw new Error('Missing Promotion Gate (api readyz) step');} let hasRun=false; for(let i=idx+1;i<lines.length;i+=1){const line=lines[i]; if(line.startsWith('      - name:')) break; const trimmed=line.trim(); if(trimmed.startsWith('if:')){throw new Error('Promotion gate must not be conditionally skipped');} if(trimmed==='run: pnpm -C apps/api run gate:readyz'){hasRun=true;} } if(!hasRun){throw new Error('Promotion gate run command missing in main CI path');} console.log('main path gate assertion passed');"

      - name: Start Readyz Fixture
        env:
          READYZ_FIXTURE_MODE: "legacy"
          READYZ_FIXTURE_STATUS: "200"
          READYZ_FIXTURE_OK: "true"
          READYZ_FIXTURE_INVALID_PAYLOAD: "false"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Promotion Gate (api readyz)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "3"
          READYZ_GATE_RETRY_DELAY_MS: "200"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: pnpm -C apps/api run gate:readyz

      - name: Stop Readyz Fixture
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Degraded-But-200)
        env:
          READYZ_FIXTURE_MODE: "degraded"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Proof (Degraded-But-200 Passes Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: pnpm -C apps/api run gate:readyz

      - name: Stop Readyz Fixture (Degraded-But-200)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Non-200)
        env:
          READYZ_FIXTURE_MODE: "failclosed"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Non-200 Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on non-200 response"
            exit 1
          fi

      - name: Start Readyz Fixture (Blocked Payload)
        env:
          READYZ_FIXTURE_MODE: "blocked"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Blocked Payload Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on contract-valid payload with blockers"
            exit 1
          fi

      - name: Stop Readyz Fixture (Blocked Payload)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Stop Readyz Fixture (Non-200)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Invalid Payload)
        env:
          READYZ_FIXTURE_MODE: "invalid"
          READYZ_FIXTURE_STATUS: "200"
          READYZ_FIXTURE_INVALID_PAYLOAD: "true"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Invalid Payload Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on invalid readiness payload"
            exit 1
          fi

      - name: Stop Readyz Fixture (Invalid Payload)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Contract Drift)
        env:
          READYZ_FIXTURE_MODE: "legacy"
          READYZ_FIXTURE_STATUS: "200"
          READYZ_FIXTURE_OK: "true"
          READYZ_FIXTURE_INVALID_PAYLOAD: "false"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "2.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Contract Drift Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on readiness contract version drift"
            exit 1
          fi

      - name: Stop Readyz Fixture (Contract Drift)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi
