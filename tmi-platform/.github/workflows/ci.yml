name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tmi_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tmi_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm -w install --frozen-lockfile

      - name: Lint (workspace)
        run: pnpm -w lint

      - name: Typecheck (web)
        run: pnpm -C apps/web exec tsc -p tsconfig.json --noEmit

      - name: Build (web)
        run: pnpm -C apps/web build

      - name: Readiness Contract (api)
        run: pnpm -C apps/api run test:readiness-contract

      - name: Build (api)
        run: pnpm -C apps/api build

      - name: Pipeline Promotion Gate Proof
        run: node scripts/pipeline-promotion-gate-proof.js

      - name: Assert Main Path Enforces gate:readyz
        run: |
          node -e "const fs=require('fs'); const lines=fs.readFileSync('.github/workflows/ci.yml','utf8').split(/\r?\n/); const idx=lines.findIndex((line)=>line.includes('- name: Promotion Gate (api readyz)')); if(idx<0){throw new Error('Missing Promotion Gate (api readyz) step');} let hasRun=false; for(let i=idx+1;i<lines.length;i+=1){const line=lines[i]; if(line.startsWith('      - name:')) break; const trimmed=line.trim(); if(trimmed.startsWith('if:')){throw new Error('Promotion gate must not be conditionally skipped');} if(trimmed==='run: node scripts/pipeline-promotion-gate.js'){hasRun=true;} } if(!hasRun){throw new Error('Promotion gate run command missing in main CI path');} console.log('main path gate assertion passed');"

      - name: Start Readyz Fixture
        env:
          READYZ_FIXTURE_MODE: "legacy"
          READYZ_FIXTURE_STATUS: "200"
          READYZ_FIXTURE_OK: "true"
          READYZ_FIXTURE_INVALID_PAYLOAD: "false"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Promotion Gate (api readyz)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "3"
          READYZ_GATE_RETRY_DELAY_MS: "200"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: node scripts/pipeline-promotion-gate.js

      - name: Stop Readyz Fixture
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Degraded-But-200)
        env:
          READYZ_FIXTURE_MODE: "degraded"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Proof (Degraded-But-200 Passes Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: pnpm -C apps/api run gate:readyz

      - name: Stop Readyz Fixture (Degraded-But-200)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Non-200)
        env:
          READYZ_FIXTURE_MODE: "failclosed"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Non-200 Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on non-200 response"
            exit 1
          fi

      - name: Start Readyz Fixture (Blocked Payload)
        env:
          READYZ_FIXTURE_MODE: "blocked"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Blocked Payload Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on contract-valid payload with blockers"
            exit 1
          fi

      - name: Stop Readyz Fixture (Blocked Payload)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Stop Readyz Fixture (Non-200)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Invalid Payload)
        env:
          READYZ_FIXTURE_MODE: "invalid"
          READYZ_FIXTURE_STATUS: "200"
          READYZ_FIXTURE_INVALID_PAYLOAD: "true"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "1.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Invalid Payload Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on invalid readiness payload"
            exit 1
          fi

      - name: Stop Readyz Fixture (Invalid Payload)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Start Readyz Fixture (Contract Drift)
        env:
          READYZ_FIXTURE_MODE: "legacy"
          READYZ_FIXTURE_STATUS: "200"
          READYZ_FIXTURE_OK: "true"
          READYZ_FIXTURE_INVALID_PAYLOAD: "false"
          READYZ_FIXTURE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_FIXTURE_CONTRACT_VERSION: "2.0"
        run: |
          node apps/api/scripts/readyz-ci-fixture.js > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid
          sleep 1

      - name: Negative Proof (Contract Drift Fails Gate)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          HEALTHZ_GATE_URL: http://127.0.0.1:4011/api/healthz
          READYZ_GATE_MAX_ATTEMPTS: "1"
          READYZ_GATE_RETRY_DELAY_MS: "100"
          READYZ_GATE_TIMEOUT_MS: "1000"
          READYZ_GATE_CONTRACT_NAME: "tmi-platform-readyz"
          READYZ_GATE_CONTRACT_VERSION: "1.0"
          PROMOTION_CANARY_MIN_SUCCESS_RATE: "1"
          PROMOTION_CANARY_REQUIRED_CONSECUTIVE_SUCCESSES: "1"
          PROMOTION_CANARY_MAX_FAILURES: "0"
        run: |
          if pnpm -C apps/api run gate:readyz; then
            echo "expected gate:readyz to fail on readiness contract version drift"
            exit 1
          fi

      - name: Stop Readyz Fixture (Contract Drift)
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi

      - name: Install Playwright Browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply DB Migrations (e2e)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tmi_platform
        run: pnpm -C packages/db exec prisma migrate deploy

      - name: Start API (e2e)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tmi_platform
          PORT: "4000"
          CORS_ORIGINS: http://localhost:3000,http://localhost:3001
        run: |
          pnpm --filter tmi-platform-api start:dev > /tmp/api-e2e.log 2>&1 &
          echo $! > /tmp/api-e2e.pid

      - name: Start Web (e2e)
        env:
          NEXTAUTH_SECRET: ci-nextauth-secret
          ROUTING_STATE_SECRET: ci-routing-secret
          API_BASE_URL: http://localhost:4000
        run: |
          pnpm -C apps/web dev -- -p 3001 > /tmp/web-e2e.log 2>&1 &
          echo $! > /tmp/web-e2e.pid

      - name: Wait E2E Runtime
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3001/auth >/dev/null && curl -fsS http://localhost:4000/api/healthz >/dev/null && curl -fsS http://localhost:4000/api/readyz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "e2e runtime failed to become ready"
          echo "--- api log ---"
          if [ -f /tmp/api-e2e.log ]; then cat /tmp/api-e2e.log; fi
          echo "--- web log ---"
          if [ -f /tmp/web-e2e.log ]; then cat /tmp/web-e2e.log; fi
          exit 1

      - name: E2E Proof (phase17.3 onboarding recovery)
        env:
          E2E_BASE_URL: http://localhost:3001
        run: pnpm exec playwright test tests/e2e/phase17_3_onboarding_recovery.spec.ts

      - name: E2E Regression (phase13.5 browser flows)
        env:
          E2E_BASE_URL: http://localhost:3001
        run: pnpm exec playwright test tests/e2e/phase13_5.spec.ts

      - name: Stop E2E Runtime
        if: always()
        run: |
          if [ -f /tmp/web-e2e.pid ]; then
            kill "$(cat /tmp/web-e2e.pid)" || true
          fi
          if [ -f /tmp/api-e2e.pid ]; then
            kill "$(cat /tmp/api-e2e.pid)" || true
          fi
