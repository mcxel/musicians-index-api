name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm -w install --frozen-lockfile

      - name: Lint (workspace)
        run: pnpm -w lint

      - name: Typecheck (web)
        run: pnpm -C apps/web exec tsc -p tsconfig.json --noEmit

      - name: Build (web)
        run: pnpm -C apps/web build

      - name: Readiness Contract (api)
        run: pnpm -C apps/api run test:readiness-contract

      - name: Build (api)
        run: pnpm -C apps/api build

      - name: Start Readyz Fixture
        run: |
          node -e "const http=require('http');http.createServer((req,res)=>{if(req.url==='/api/readyz'){res.writeHead(200,{'content-type':'application/json'});res.end(JSON.stringify({ok:true,blockers:[]}));return;}res.writeHead(404);res.end();}).listen(4011,'127.0.0.1');" > /tmp/readyz-fixture.log 2>&1 &
          echo $! > /tmp/readyz-fixture.pid

      - name: Promotion Gate (api readyz)
        env:
          READYZ_GATE_URL: http://127.0.0.1:4011/api/readyz
          READYZ_GATE_MAX_ATTEMPTS: "3"
          READYZ_GATE_RETRY_DELAY_MS: "200"
          READYZ_GATE_TIMEOUT_MS: "1000"
        run: pnpm -C apps/api run gate:readyz

      - name: Stop Readyz Fixture
        if: always()
        run: |
          if [ -f /tmp/readyz-fixture.pid ]; then
            kill "$(cat /tmp/readyz-fixture.pid)" || true
          fi
