
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a0a2e;color:#fff;font-family:Impact,'Arial Black',sans-serif}
.tabs{display:flex;gap:4px;padding:8px 10px;background:#0a1628;flex-wrap:wrap;border-bottom:2px solid #FF6B00;position:sticky;top:0;z-index:100}
.tab{padding:4px 10px;border-radius:4px;border:1px solid rgba(255,255,255,0.15);background:transparent;color:rgba(255,255,255,.5);font-size:8px;font-weight:900;cursor:pointer;font-family:Inter,sans-serif;letter-spacing:.08em;white-space:nowrap;transition:all .15s}
.tab.on{background:#FF6B00;color:#fff;border-color:#FF6B00;box-shadow:0 0 10px #FF6B0066}
.page{position:relative;min-height:600px;background:#1a0a2e;padding:14px;overflow:hidden}
.tri{position:absolute;width:0;height:0;border-style:solid;pointer-events:none;opacity:.55}
/* Neon text glow */
.glow-or{text-shadow:0 0 10px #FF6B0099,0 0 20px #FF6B0055}
.glow-gd{text-shadow:0 0 10px #FFD70099}
.glow-cy{text-shadow:0 0 10px #00D4FF99}
.glow-pk{text-shadow:0 0 10px #FF2DAA99}
/* Geo blocks */
.geo{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 14px;position:relative;overflow:hidden}
.geo-label{font-size:7px;font-weight:900;letter-spacing:.15em;font-family:Inter,sans-serif;opacity:.5;text-transform:uppercase;position:absolute;top:6px;left:10px}
/* Video tile */
.vtile{border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0;overflow:hidden}
.vtile-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.06)}
/* Buttons */
.btn{padding:6px 16px;border-radius:20px;font-size:9px;font-weight:900;font-family:Inter,sans-serif;letter-spacing:.08em;cursor:pointer;text-align:center;border:2px solid;display:inline-block}
/* Split bar */
.split-bar{height:2px;background:linear-gradient(90deg,#FF6B00,#FFD700,#00D4FF);margin:6px 0}
.section-head{font-size:18px;font-weight:900;letter-spacing:.04em;font-family:Impact,sans-serif;margin-bottom:8px}
.pill{padding:3px 10px;border-radius:12px;font-size:8px;font-weight:900;font-family:Inter,sans-serif;letter-spacing:.08em;display:inline-block}
</style>

<div style="background:#1a0a2e;min-height:100vh">
<div class="tabs" id="tabs"></div>
<div id="content"></div>
</div>

<script>
const OR='#FF6B00',GD='#FFD700',CY='#00D4FF',PK='#FF2DAA',TL='#00A896';
const PU='#6B2FB3',DT='#1A4A6A',NV='#0D1B2A',RD='#CC2200',MG='#8B1A8B';

const SHP={
  hex:'polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)',
  pent:'polygon(50% 0%,100% 38%,82% 100%,18% 100%,0% 38%)',
  tagR:'polygon(15% 0%,100% 0%,100% 100%,15% 100%,0% 50%)',
  tagL:'polygon(0% 0%,85% 0%,100% 50%,85% 100%,0% 100%)',
  blob:'polygon(3% 0%,97% 2%,100% 97%,0% 100%)',
  slash:'polygon(0% 0%,90% 0%,100% 100%,10% 100%)',
  shield:'polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)',
  oct:'polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%)',
  jagg:'polygon(0% 5%,93% 0%,100% 94%,7% 100%)',
};

function confetti(count=22){
  const colors=[OR,GD,CY,PK,TL,'#FF8C00','#00FF88'];
  let h='';
  for(let i=0;i<count;i++){
    const c=colors[i%colors.length];
    const x=(i*13+7)%98,y=(i*17+11)%94;
    const s=5+(i%4)*3,r=i*37;
    h+=`<div style="position:absolute;left:${x}%;top:${y}%;width:${s}px;height:${s}px;background:${c};opacity:.5;clip-path:polygon(50% 0%,0% 100%,100% 100%);transform:rotate(${r}deg);pointer-events:none"></div>`;
  }
  return h;
}

function geo(bg,border,shape,w,h,label,inner='',extra=''){
  return `<div style="background:${bg};border:2px solid ${border};clip-path:${SHP[shape]||'none'};width:${w};height:${h}px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 14px;position:relative;overflow:hidden;box-sizing:border-box;${extra}">
    <div style="font-size:7px;font-weight:900;color:${border};letter-spacing:.15em;font-family:Inter,sans-serif;opacity:.6;text-transform:uppercase;position:absolute;top:6px;left:10px">${label}</div>
    ${inner}
  </div>`;
}

function vtile(w,h,border=CY,live=false,label='',extra=''){
  const liveBadge=live?`<div style="position:absolute;top:5px;left:5px;background:${RD};color:#fff;font-size:7px;font-weight:900;font-family:Inter,sans-serif;padding:2px 6px;border-radius:3px;letter-spacing:.1em">LIVE</div>`:'';
  return `<div style="width:${w}px;height:${h}px;background:${DT};border:2px solid ${border};border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;flex-shrink:0;overflow:hidden;box-shadow:${live?'0 0 12px '+RD+'66':'none'};${extra}">
    ${liveBadge}
    <div style="width:${w*.45}px;height:${w*.45}px;border-radius:50%;background:rgba(255,255,255,.07);border:1.5px solid ${border}44;display:flex;align-items:center;justify-content:center;font-size:${w*.2}px">👤</div>
    <div style="font-size:8px;color:rgba(255,255,255,.35);font-family:Inter,sans-serif;font-weight:700;letter-spacing:.05em;margin-top:4px">${label}</div>
  </div>`;
}

function btn(label,bg,color='#fff',border=''){
  return `<div style="background:${bg};color:${color};padding:6px 18px;border-radius:20px;font-size:9px;font-weight:900;font-family:Inter,sans-serif;letter-spacing:.08em;cursor:pointer;border:2px solid ${border||bg};display:inline-block;box-shadow:0 0 10px ${bg}66">${label}</div>`;
}

function pill(text,bg,color='#fff'){
  return `<span style="background:${bg};color:${color};padding:3px 10px;border-radius:12px;font-size:8px;font-weight:900;font-family:Inter,sans-serif;letter-spacing:.08em">${text}</span>`;
}

function neonHead(text,color,size=22){
  return `<div style="font-size:${size}px;font-weight:900;font-family:Impact,'Arial Black',sans-serif;color:${color};letter-spacing:.03em;text-shadow:0 0 14px ${color}88;line-height:1.05">${text}</div>`;
}
