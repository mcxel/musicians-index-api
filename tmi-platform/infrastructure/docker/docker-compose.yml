version: "3.9"

# TMI Platform — local full-stack compose
# For production, set env vars via secrets manager or platform dashboard

services:
  # ── PostgreSQL (local dev only — use Neon in production) ────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tmi
      POSTGRES_PASSWORD: tmi_local
      POSTGRES_DB: tmi_platform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmi"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (BullMQ, sessions, pub-sub) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API (NestJS) ────────────────────────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tmi:tmi_local@postgres:5432/tmi_platform
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: "true"
      BOTS_ENABLED: "true"
      NOTIFICATIONS_ENABLED: "true"
      PORT: "4000"
      CORS_ORIGINS: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ALLOWED_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Web (Next.js) ───────────────────────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      DATABASE_URL: postgresql://tmi:tmi_local@postgres:5432/tmi_platform
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      API_BASE_URL: http://api:4000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
