services:
  - type: web
    name: tmi-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter db exec prisma generate && pnpm --filter api... build
    startCommand: pnpm --filter api start
    # GET / is handled before setGlobalPrefix("api") — returns { ok: true }
    # All NestJS routes live under /api (e.g. /api/healthz, /api/readyz)
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      # DATABASE_URL is the only REQUIRED_BOOT_ENV — app throws without it
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MEILISEARCH_URL
        sync: false
      - key: MEILISEARCH_KEY
        sync: false
      - key: MUX_TOKEN_ID
        sync: false
      - key: MUX_TOKEN_SECRET
        sync: false
