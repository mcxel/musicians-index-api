services:
  - type: web
    name: tmi-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install && pnpm --filter api... build
    startCommand: pnpm --filter api start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
